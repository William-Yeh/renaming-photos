name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install exiftool
        run: sudo apt-get install -y libimage-exiftool-perl
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Run tests
        run: uv run pytest tests/ -v
